name: Build Docker Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Docker image tag
        required: true
        default: latest
        type: string
      push_latest:
        description: Push latest when tag is not latest
        required: true
        default: true
        type: boolean

permissions:
  contents: read

env:
  DOCKER_REGISTRY: ${{ vars.DOCKER_REGISTRY }}
  DOCKER_NAMESPACE: ${{ vars.DOCKER_NAMESPACE }}
  DOCKER_IMAGE_NAME: ${{ vars.DOCKER_IMAGE_NAME }}

jobs:
  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Validate configuration
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          set -euo pipefail

          missing=0
          for name in DOCKER_REGISTRY DOCKER_NAMESPACE DOCKER_IMAGE_NAME DOCKER_USERNAME DOCKER_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "${name} is required"
              missing=1
            fi
          done

          exit "${missing}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Prepare Docker tags
        id: tags
        env:
          TAG: ${{ inputs.tag }}
          PUSH_LATEST: ${{ inputs.push_latest }}
        run: |
          set -euo pipefail

          image="${DOCKER_REGISTRY}/${DOCKER_NAMESPACE}/${DOCKER_IMAGE_NAME}"
          tags="${image}:${TAG}"

          if [ "${TAG}" != "latest" ] && [ "${PUSH_LATEST}" = "true" ]; then
            tags="${tags},${image}:latest"
          fi

          echo "tags=${tags}" >> "${GITHUB_OUTPUT}"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: app
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
